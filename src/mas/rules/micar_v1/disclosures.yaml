    - id: "marketing_consistent"
      description: >-
        All marketing activities must be consistent with whitepaper disclosures.
    - id: "prospectus_present"
      description: >-
        A formal prospectus must be provided, containing detailed financial information
        about the asset, its risks, and its market potential. This document serves as an
        essential disclosure for investors, providing them with all the necessary
        information to make informed decisions.
    - id: "registered_with_authority"
      description: >-
        The asset must be officially registered with the relevant regulatory authority,
        ensuring that it meets the required legal and financial standards. This provides
        investors with assurance that the asset is legitimate and subject to regulatory
        oversight.
    - id: "investor_protection_mechanisms"
      description: >-
        The project must implement mechanisms designed to protect investors, including
        safeguards against fraud, risk mitigation measures, and avenues for dispute
        resolution. These mechanisms are essential for fostering investor confidence and
        maintaining market integrity.


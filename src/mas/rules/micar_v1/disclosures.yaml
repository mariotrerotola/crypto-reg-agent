# MiCAR Disclosure Requirements — Aligned to Regulation (EU) 2023/1114
#
# Sources:
#   OTHER (Title II): Article 6 + Annex I
#   ART   (Title III): Article 19 + Annex II
#   EMT   (Title IV): Article 51 + Annex III
#   SECURITY: Outside MiCAR scope (MiFID II / Prospectus Regulation)
#
# Common obligations (Articles 6, 19, 51) appear in all MiCAR checklists.
# Class-specific obligations are appended per title.
#
# v1.1 — Updated from EUR-Lex official text.

version: "1.1"
jurisdiction: "EU-MiCAR"

checklists:
  # ──────────────────────────────────────────────────
  # EMT — E-Money Tokens (Title IV, Art. 51 + Annex III)
  # ──────────────────────────────────────────────────
  emt:
    # --- Common obligations (Art. 51, mirroring Art. 6) ---
    - id: "whitepaper_present"
      article: "Art. 51(1)"
      description: >-
        A crypto-asset white paper must be drawn up and published.
        It shall contain all information specified in Annex III.
    - id: "issuer_identified"
      article: "Art. 51(1)(a)"
      description: >-
        Information about the issuer of the e-money token, including
        legal name, registered address, and contact details.
    - id: "project_description"
      article: "Art. 51(1)(b)"
      description: >-
        Detailed description of the e-money token, including its
        intended purpose and functioning.
    - id: "risk_factors_disclosed"
      article: "Art. 51(1)(f)"
      description: >-
        A detailed description of the risks relating to the issuer,
        the e-money token, and the implementation of the project.
    - id: "technology_disclosed"
      article: "Art. 51(1)(e)"
      description: >-
        Information on the underlying technology used, including
        the distributed ledger technology and protocols.
    - id: "rights_obligations_disclosed"
      article: "Art. 51(1)(d)"
      description: >-
        A detailed description of the rights and obligations attached
        to the e-money token, including the right of redemption at
        par value.
    - id: "environmental_impact_disclosed"
      article: "Art. 51(1)(g)"
      description: >-
        Information on the principal adverse impacts on the climate
        and other environment-related adverse impacts of the consensus
        mechanism used.
    - id: "disclaimers_present"
      article: "Art. 51(3),(5)"
      description: >-
        Mandatory disclaimer that the white paper has not been approved
        by any competent authority, plus warnings about value loss risk,
        no investor compensation scheme, and no deposit guarantee scheme.
    - id: "summary_present"
      article: "Art. 51(7)"
      description: >-
        A summary, in brief and non-technical language, which shall state
        in particular that the holder has a right of redemption at par value
        at any time.
    - id: "marketing_consistent"
      article: "Art. 53"
      description: >-
        All marketing communications shall be fair, clear and not misleading,
        and consistent with the information in the white paper.
    - id: "kyc_aml_controls"
      article: "Directive 2015/849 (AMLD)"
      description: >-
        The issuer must implement KYC and AML processes as required
        by applicable anti-money laundering legislation.
    # --- EMT-specific obligations ---
    - id: "redeemable_at_par"
      article: "Art. 49(1)"
      description: >-
        Holders of e-money tokens shall be provided with a claim on the
        issuer: the right to redeem at any time and at par value against
        the reference official currency.
    - id: "redemption_policy_clear"
      article: "Art. 49(2)-(7)"
      description: >-
        The conditions of redemption, including any fees, must be clearly
        and prominently stated in the white paper and on the issuer's website.
    - id: "reserve_assets_held"
      article: "Art. 54(1)"
      description: >-
        Issuers of e-money tokens shall safeguard the funds received in
        exchange for e-money tokens, in accordance with Article 7 of
        Directive 2009/110/EC.
    - id: "reserves_audited"
      article: "Art. 54, recital 66"
      description: >-
        The reserves shall be subject to an independent audit at least
        every six months to verify the reserves adequately back the
        tokens in circulation.
    - id: "safeguarding_mechanism"
      article: "Art. 54(2)"
      description: >-
        Funds received in exchange for e-money tokens shall be invested
        in secure, low-risk assets or placed in segregated accounts at
        credit institutions.

  # ──────────────────────────────────────────────────
  # ART — Asset-Referenced Tokens (Title III, Art. 19 + Annex II)
  # ──────────────────────────────────────────────────
  art:
    # --- Common obligations (Art. 19) ---
    - id: "whitepaper_present"
      article: "Art. 19(1)"
      description: >-
        A crypto-asset white paper must be drawn up, notified to the
        competent authority, and published. It shall contain all
        information specified in Annex II.
    - id: "issuer_identified"
      article: "Art. 19(1)(a)"
      description: >-
        Information about the issuer of the asset-referenced token,
        including legal name, address, and registration details.
    - id: "project_description"
      article: "Art. 19(1)(b)"
      description: >-
        Detailed description of the asset-referenced token and
        the project, including how the value stabilisation is achieved.
    - id: "risk_factors_disclosed"
      article: "Art. 19(1)(f)"
      description: >-
        A detailed description of the risks relating to the issuer,
        the asset-referenced token, and the implementation of the project.
    - id: "technology_disclosed"
      article: "Art. 19(1)(e)"
      description: >-
        Information on the underlying technology, including the DLT
        and protocols used.
    - id: "rights_obligations_disclosed"
      article: "Art. 19(1)(d)"
      description: >-
        A detailed description of the rights and obligations attached
        to the asset-referenced token, including any right to redemption
        or claim on the reserve.
    - id: "environmental_impact_disclosed"
      article: "Art. 19(1)(h)"
      description: >-
        Information on the principal adverse impacts on the climate and
        other environment-related adverse impacts of the consensus mechanism.
    - id: "disclaimers_present"
      article: "Art. 19(4)"
      description: >-
        The white paper must contain a clear warning that the token
        may lose its value, may not always be transferable, may not be
        liquid, and is not covered by investor compensation or deposit
        guarantee schemes.
    - id: "summary_present"
      article: "Art. 19(6)"
      description: >-
        A summary in brief and non-technical language, providing key
        information about the offer to the public or admission to trading.
    - id: "management_body_statement"
      article: "Art. 19(5)"
      description: >-
        A statement by the management body that the white paper complies
        with the regulation and that the information is fair, clear and
        not misleading.
    - id: "marketing_consistent"
      article: "Art. 29"
      description: >-
        All marketing communications shall be consistent with the white
        paper and shall be fair, clear and not misleading.
    - id: "kyc_aml_controls"
      article: "Directive 2015/849 (AMLD)"
      description: >-
        The issuer must comply with applicable AML/KYC obligations.
    # --- ART-specific obligations (Annex II, Art. 36) ---
    - id: "reserve_composition_disclosed"
      article: "Art. 36(1), Annex II"
      description: >-
        The composition of the reserve of assets backing the token,
        including the types and proportions of assets, must be disclosed
        in the white paper.
    - id: "reserve_custody_disclosed"
      article: "Art. 37"
      description: >-
        Information about the custody arrangements for the reserve assets,
        including the identity of custodians and segregation of assets.
    - id: "valuation_method_disclosed"
      article: "Annex II Part E"
      description: >-
        The method used to value the reserve assets, including frequency
        of valuation and any models or algorithms used.
    - id: "redemption_mechanism_disclosed"
      article: "Art. 39"
      description: >-
        The mechanism and conditions for redeeming the asset-referenced
        token against the reserve assets, including applicable fees
        and timelines.
    - id: "governance_arrangements_disclosed"
      article: "Art. 34"
      description: >-
        The governance arrangements of the issuer, including the
        management structure, decision-making processes, and internal
        control mechanisms.

  # ──────────────────────────────────────────────────
  # OTHER — Crypto-assets other than ART/EMT (Title II, Art. 6 + Annex I)
  # ──────────────────────────────────────────────────
  other:
    - id: "whitepaper_present"
      article: "Art. 6(1)"
      description: >-
        A crypto-asset white paper must be drawn up and notified to the
        competent authority. It shall contain the information specified
        in Annex I.
    - id: "issuer_identified"
      article: "Art. 6(1)(a)-(b)"
      description: >-
        Information about the offeror or person seeking admission to
        trading, and about the issuer if different.
    - id: "project_description"
      article: "Art. 6(1)(d)"
      description: >-
        Information about the crypto-asset project, including planned
        use of funds raised, milestones, and relevant persons.
    - id: "risk_factors_disclosed"
      article: "Art. 6(1)(h)"
      description: >-
        A description of the risks relating to the offeror, the issuer,
        and the crypto-asset, including risks of total loss.
    - id: "technology_disclosed"
      article: "Art. 6(1)(g)"
      description: >-
        Information on the underlying technology, including the DLT
        used, protocols, and technical standards.
    - id: "rights_obligations_disclosed"
      article: "Art. 6(1)(f)"
      description: >-
        A detailed description of the rights and obligations attached
        to the crypto-asset, including limitations and restrictions.
    - id: "environmental_impact_disclosed"
      article: "Art. 6(1)(i)"
      description: >-
        Information on the principal adverse impacts on the climate and
        other environment-related adverse impacts of the consensus mechanism.
    - id: "disclaimers_present"
      article: "Art. 6(3),(5)"
      description: >-
        Mandatory disclaimer that the white paper has not been approved
        by any competent authority, plus warning that the crypto-asset may
        lose its value in full, may not always be transferable, and may
        not be liquid.
    - id: "summary_present"
      article: "Art. 6(7)"
      description: >-
        A summary in brief and non-technical language, providing key
        information about the offer.
    - id: "management_body_statement"
      article: "Art. 6(6)"
      description: >-
        A statement by the management body that the white paper complies
        with the regulation and that information is complete and not
        misleading.
    - id: "marketing_consistent"
      article: "Art. 7"
      description: >-
        Marketing communications shall be identifiable, fair, clear and
        not misleading, and consistent with the white paper.
    - id: "kyc_aml_controls"
      article: "Directive 2015/849 (AMLD)"
      description: >-
        The offeror/issuer must comply with applicable AML/KYC obligations.

  # ──────────────────────────────────────────────────
  # SECURITY — Outside MiCAR scope (Art. 2(4), subject to MiFID II)
  # These are NOT MiCAR requirements but MiFID II / Prospectus Regulation.
  # Included for completeness since our classifier flags securities.
  # ──────────────────────────────────────────────────
  security:
    - id: "micar_excluded"
      article: "Art. 2(4)"
      description: >-
        This crypto-asset qualifies as a financial instrument under
        MiFID II and is therefore EXCLUDED from MiCAR scope. The
        following checks are under the Prospectus Regulation.
    - id: "prospectus_present"
      article: "Prospectus Reg. (EU) 2017/1129"
      description: >-
        A prospectus compliant with the EU Prospectus Regulation must be
        published for public offerings of securities.
    - id: "registered_with_authority"
      article: "MiFID II Art. 5"
      description: >-
        The issuer must be authorised and registered with the relevant
        competent authority (e.g., national securities regulator).
    - id: "investor_protection_mechanisms"
      article: "MiFID II Art. 24-25"
      description: >-
        Investor protection mechanisms including suitability assessment,
        best execution, and disclosure obligations.

  # ──────────────────────────────────────────────────
  # NON_MICAR — Outside MiCAR scope (NFTs, excluded assets)
  # Minimal checks for informational purposes only.
  # ──────────────────────────────────────────────────
  non_micar:
    - id: "documentation_present"
      article: "N/A (informational)"
      description: >-
        Basic project documentation should be available even for
        non-MiCAR assets, for transparency purposes.

  # ──────────────────────────────────────────────────
  # NON_CLASSIFIABLE — No crypto indicators detected
  # ──────────────────────────────────────────────────
  non_classifiable:
    - id: "documentation_present"
      article: "N/A (informational)"
      description: >-
        No classifiable crypto-asset indicators were detected.
        Basic documentation check only.
